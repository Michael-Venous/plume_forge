schema_version = "1.0.0"

id = "plume_forge"
version = "0.1.0"
name = "Plume Forge"
tagline = "Interactive GPU smoke and fire simulation"
maintainer = "Plume Forge"
type = "add-on"

blender_version_min = "5.1.0"
license = ["SPDX:GPL-3.0-or-later"]
platforms = ["linux-x64", "windows-x64"]

[permissions]
files = "Write OpenVDB caches and run the bundled simulation bridge"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  ".*",
  "*.pyc",
  "*.zip",
]
